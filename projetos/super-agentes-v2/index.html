<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Agentes v13 — Máquina de Análise</title>
<style>
:root {
  --bg: #fbfaf8; --card: #ffffff; --text: #2d3436;
  --g: #7b9e7d; --gl: #a8c5a9; --b: #8a9eb6; --bl: #b8c9db;
  --r: #d4756b; --y: #d4a76b; --brd: #e8e4df;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: var(--card); border-bottom: 1px solid var(--brd); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
header h1 { font-size: 1.2em; font-weight: 600; color: var(--g); }
header .badge { font-size: .75em; background: var(--gl); color: #3d5a3f; padding: 3px 8px; border-radius: 10px; }
nav { display: flex; gap: 2px; padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--brd); overflow-x: auto; }
nav button { padding: 8px 14px; border: none; background: transparent; cursor: pointer; font-size: .88em; color: #888; border-radius: 6px; white-space: nowrap; transition: .2s; }
nav button:hover { background: var(--bg); color: var(--text); }
nav button.active { background: var(--g); color: #fff; }
main { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
.card { background: var(--card); border: 1px solid var(--brd); border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.card h2 { font-size: 1em; margin-bottom: 12px; color: var(--g); }
.grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.kpi { background: var(--card); border: 1px solid var(--brd); border-radius: 8px; padding: 16px; text-align: center; box-shadow: var(--shadow); }
.kpi .num { font-size: 2em; font-weight: 700; color: var(--g); }
.kpi .lbl { font-size: .78em; color: #999; margin-top: 4px; }
.badge-go { background: #d4edda; color: #2d6a3f; padding: 4px 10px; border-radius: 12px; font-size: .78em; }
.badge-cond { background: #fff3cd; color: #856404; padding: 4px 10px; border-radius: 12px; font-size: .78em; }
.badge-nogo { background: #f8d7da; color: #721c24; padding: 4px 10px; border-radius: 12px; font-size: .78em; }
.badge-data { background: #e8e4df; color: #888; padding: 4px 10px; border-radius: 12px; font-size: .78em; }
input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--brd); border-radius: 6px; font-size: .9em; background: var(--bg); margin-bottom: 10px; font-family: inherit; }
button.btn { background: var(--g); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: .9em; font-weight: 500; transition: .2s; }
button.btn:hover { opacity: .9; }
button.btn-sm { padding: 6px 14px; font-size: .82em; }
.alert { padding: 12px 16px; border-radius: 6px; margin: 8px 0; font-size: .85em; }
.alert-warn { background: #fff8e1; color: #856404; border-left: 3px solid var(--y); }
.alert-err { background: #fce4e4; color: #721c24; border-left: 3px solid var(--r); }
.alert-info { background: #e8f4f8; color: #2d6a3f; border-left: 3px solid var(--b); }
.result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--brd); font-size: .88em; }
.result-row:last-child { border: none; }
.pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--g); animation: pulse 2s infinite; margin-right: 6px; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
footer { text-align: center; padding: 20px; color: #aaa; font-size: .75em; }
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--g); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: .85em; z-index: 999; animation: slideUp .3s; }
@keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.modal-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000; }
.modal { background:#fff;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15); }
.modal h3 { color:var(--g);margin-bottom:16px; }
.supplier-card { background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px; }
.supplier-card .info { flex:1;min-width:200px; }
.supplier-card .actions { display:flex;gap:6px;flex-wrap:wrap; }
.btn-whatsapp { background:#25d366;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.78em; }
.btn-email { background:var(--b);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.78em; }
.btn-copy { background:var(--y);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.78em; }
.tag-nicho { background:var(--bg);padding:4px 10px;border-radius:12px;font-size:.78em;cursor:pointer;white-space:nowrap;display:inline-block;margin:2px;transition:.2s; }
.tag-nicho:hover { background:var(--gl);color:#3d5a3f; }
</style>

<script type="module">
import { TEIA } from '/public/teia.js';
import { calcularCVFF, calcularMargem, calcularLandedCost } from '/public/calculos.js';
import { DADOS_NICHOS, CATEGORIAS, gerarRanking } from '/public/prospect.js';

// Expor no window para uso pelas funções existentes
window.TEIA = TEIA;
window.calcularCVFF = calcularCVFF;
window.calcularMargem = calcularMargem;
window.calcularLandedCost = calcularLandedCost;

window.CATEGORIAS = CATEGORIAS;
window.gerarRanking = gerarRanking;
</script>

<script>
// ============================================================
// CONFIGURAÇÃO
// ============================================================
const VERSAO = '13.0.0';
const PROVIDERS = {
  deepseek:  { name:'DeepSeek',  url:'https://api.deepseek.com/v1/chat/completions',       model:'deepseek-chat' },
  anthropic: { name:'Anthropic', url:'https://api.anthropic.com/v1/messages',              model:'claude-sonnet-4-20250514' },
  minimax:   { name:'MiniMax',   url:'https://api.minimax.chat/v1/text/chatcompletion_v2', model:'MiniMax-Text-01' },
  zai:       { name:'Z.AI/GLM',  url:'https://open.bigmodel.cn/api/paas/v4/chat/completions', model:'glm-4' },
};

// ============================================================
// ESTADO GLOBAL (TEIA)
// ============================================================
const TEIA = {
  init: Date.now(),
  pulse: { ciclos:0, calculos:0, prospeccoes:0, consultas:0, alertas:0 },
  dados: {},
  log: [],
  feedback: {},

  registrar(acao, dados={}) {
    this.pulse.ciclos++;
    if (acao.includes('calculo')) this.pulse.calculos++;
    if (acao.includes('prosp')) this.pulse.prospeccoes++;
    if (acao.includes('consulta')) this.pulse.consultas++;
    this.log.push({ acao, ts: Date.now(), dados });
    localStorage.setItem('sa_teia_log', JSON.stringify(this.log.slice(-50)));
    syncToCloud();
    updatePulse();
  },

  trigger(acao, dados={}) {
    const sugestoes = [];
    const preco = parseFloat(dados.preco || dados.sell_price || 0);
    const margem = parseFloat(dados.margem || dados.net_margin || 0);

    if (preco > 0 && preco < 80) sugestoes.push({ skill:'bundle_optimizer', msg:'💡 CVFF come margem — venda em KIT', target:'calc' });
    if (margem > 0.5) sugestoes.push({ skill:'elasticidade_preco', msg:'📈 Margem alta — teste preço premium', target:'calc' });
    if (margem < 0.2 && margem > 0) sugestoes.push({ skill:'fornecedor_china', msg:'⚠️ Margem apertada — negocie FOB na China', target:'forn' });
    if (acao.includes('prosp') || acao.includes('forn')) sugestoes.push({ skill:'supplier_negotiation', msg:'🤝 Aplique playbook de negociação', target:'forn' });

    return sugestoes;
  },

  brainPulse() {
    const ev = this.pulse.ciclos;
    if (ev > 100) return '🌲';
    if (ev > 50) return '🌳';
    if (ev > 20) return '🌿';
    return '🌱';
  },

  status() {
    return {
      horas: Math.floor((Date.now() - this.init) / 3600000),
      eventos: this.pulse.ciclos,
      confianca: this._confianca(),
      trending: this._trending(),
    };
  },

  _confianca() {
    const t = Object.values(this.feedback).filter(v => v > 0);
    return t.length > 0 ? Math.round(t.reduce((a,b) => a + b, 0) / t.length * 100) : 0;
  },

  _trending() {
    const recentes = this.log.slice(-20);
    const counts = {};
    recentes.forEach(l => { const a = l.acao.split('_')[0]; counts[a] = (counts[a] || 0) + 1; });
    return Object.entries(counts).sort((a,b) => b[1] - a[1])[0]?.[0] || '-';
  },
};

// ============================================================
// PERSISTÊNCIA (localStorage + Cloud)
// ============================================================
function loadState() {
  try {
    const raw = localStorage.getItem('sa_api_keys');
    if (raw) window.apiKeys = JSON.parse(raw);
  } catch(e) { window.apiKeys = { deepseek: '', anthropic: '', minimax: '', zai: '' }; }
  if (!window.apiKeys) window.apiKeys = { deepseek: '', anthropic: '', minimax: '', zai: '' };

  window.currentProvider = localStorage.getItem('sa_provider') || 'deepseek';

  try {
    const teiaLog = localStorage.getItem('sa_teia_log');
    if (teiaLog) TEIA.log = JSON.parse(teiaLog);
  } catch(e) {}
}

async function loadFromCloud() {
  let d = null;
  try {
    const r = await fetch('/api/state');
    if (r.ok) {
      d = await r.json();
      if (d && d.state) {
        if (d.state.apiKeys) { window.apiKeys = {...window.apiKeys, ...d.state.apiKeys}; saveKeys(); }
        if (d.state.provider) { window.currentProvider = d.state.provider; localStorage.setItem('sa_provider', d.state.provider); }
      }
    }
  } catch(e) {
    console.warn('Erro ao carregar do cloud:', e);
  }
  updateSyncStatus(d?.source === 'kv');
}

async function syncToCloud() {
  try {
    await fetch('/api/state', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        version: VERSAO,
        apiKeys: window.apiKeys,
        provider: window.currentProvider,
        teia: { pulse: TEIA.pulse, brainLevel: TEIA.brainPulse() },
      }),
    });
    updateSyncStatus(true);
  } catch(e) { updateSyncStatus(false); }
}

function updateSyncStatus(cloud) {
  const el = document.getElementById('syncStatus');
  if (el) el.innerHTML = cloud ? '☁️ Cloud sync' : '📡 Cache ativo';
}

function saveKeys() {
  localStorage.setItem('sa_api_keys', JSON.stringify(window.apiKeys || {}));
  localStorage.setItem('sa_provider', window.currentProvider);
}

function getKey() {
  return (window.apiKeys || {})[window.currentProvider] || '';
}

function updatePulse() {
  const el = document.getElementById('brainLevel');
  if (el) el.textContent = TEIA.brainPulse();
}

// ============================================================
// CALL IA (proxy unificado)
// ============================================================
async function callAI(messages, maxTokens = 500) {
  const key = getKey();
  if (!key) throw new Error('Configure a chave API em ⚙️ IA');
  const pr = PROVIDERS[window.currentProvider];
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 25000); // 25s timeout
  try {
    const r = await fetch('/api/proxy', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        provider: window.currentProvider,
        model: pr.model,
        messages,
        max_tokens: maxTokens,
        api_key: key,
      }),
      signal: controller.signal,
    });
    clearTimeout(timeout);
    if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.error || 'HTTP ' + r.status); }
    return r.json();
  } catch(e) {
    clearTimeout(timeout);
    if (e.name === 'AbortError') throw new Error('⏱️ Timeout — a IA demorou mais de 25s');
    throw e;
  }
}

// ============================================================
// NAVEGAÇÃO
// ============================================================
const TAB_CACHE = {};        // cache visual por aba — persiste consultas
let currentTab = 'overview'; // aba ativa

function switchTab(tab, btn) {
  // Fechar modais abertos antes de salvar cache
  document.querySelectorAll('.modal-overlay').forEach(m => m.remove());

  // Salvar HTML da aba atual no cache ANTES de sair (sem modais)
  const main = document.getElementById('main');
  if (currentTab && main.innerHTML) {
    TAB_CACHE[currentTab] = main.innerHTML;
  }

  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
  } else {
    // Highlight pelo nome da aba quando chamado programaticamente
    const navBtn = document.querySelector(`nav button[onclick*="'${tab}'"]`);
    if (navBtn) navBtn.classList.add('active');
  }

  // Se já tem cache desta aba, restaura em vez de regenerar
  if (TAB_CACHE[tab]) {
    main.innerHTML = TAB_CACHE[tab];
    currentTab = tab;
    return;
  }

  const tabs = { overview, calc, prosp, copilot, forn, intel, pipeline, ia, saas };
  try {
    (tabs[tab] || overview)();
    currentTab = tab;
  } catch(e) {
    main.innerHTML = `<div class="card"><h2>⚠️ Erro</h2><p>${e.message}</p></div>`;
  }
}

// Força regeneração de uma aba (quando dados mudam via pipeline)
function refreshTab(tab) {
  delete TAB_CACHE[tab];
  switchTab(tab);  // sempre troca, mesmo de outra aba
}

// ABA 1: VISÃO GERAL

// ABA 2: CALCULADORAS
// ============================================================

  document.getElementById('main').innerHTML = `
    <div class="card">

// ============================================================
// FUNÇÕES DE CÁLCULO
// ============================================================
function getCVFF(preco) {
  if (preco <= 0) return 0;
  if (preco <= 25) return 4.50;
  if (preco <= 35) return 5.00;
  if (preco <= 45) return 5.50;
  if (preco <= 55) return 6.00;
  if (preco <= 70) return 6.50;
  if (preco <= 90) return 7.00;
  if (preco <= 120) return 7.50;
  return 8.00;
}

function calcularCVFF() {
  const preco = parseFloat(document.getElementById('cvffPreco').value) || 0;
  const custo = parseFloat(document.getElementById('cvffCusto').value) || 0;
  const tipo = document.getElementById('cvffTipo').value;
  const cvff = getCVFF(preco);
  const comissao = tipo === 'premium' ? preco * 0.12 : preco * 0.07;
  const embalagem = 1.50;
  const lucro = preco - custo - cvff - comissao - embalagem;
  const margem = preco > 0 ? lucro / preco : 0;

  // Enforce audit
  const enforce = aplicarEnforce(margem, preco, cvff);

  const el = document.getElementById('cvffResult');
  el.innerHTML = `
    <div class="result-row"><span>Preço de venda</span><span>R$ ${preco.toFixed(2)}</span></div>
    <div class="result-row"><span>Custo unitário</span><span>R$ ${custo.toFixed(2)}</span></div>
    <div class="result-row"><span>CVFF (taxa fixa)</span><span style="color:var(--r)">R$ ${cvff.toFixed(2)}</span></div>

    <div class="result-row"><span>Embalagem</span><span>R$ ${embalagem.toFixed(2)}</span></div>

function aplicarEnforce(margem, preco, cvff) {
  if (margem < 0) return { badge:'NO-GO', razao: 'Margem negativa — produto dá PREJUÍZO' };

  if (margem < 0.20) return { badge:'COND', razao: `Margem apertada (${(margem*100).toFixed(1)}%). Verificar kit.` };
  if (cvff > preco * 0.10) return { badge:'COND', razao: `CVFF come ${(cvff/preco*100).toFixed(1)}% do preço. Considere KIT.` };
  return { badge:'GO', razao: `Margem saudável (${(margem*100).toFixed(1)}%)` };
}

function calcularLandedCost() {
  const fob = parseFloat(document.getElementById('lcFob').value) || 0;
  const ncm = document.getElementById('lcNcm').value || '0000.00.00';
  const vol = parseFloat(document.getElementById('lcVolume').value) || 0;
  const qtd = parseInt(document.getElementById('lcQtd').value) || 1;
  const modo = document.getElementById('lcModo').value;
  const ptax = 5.20;

  // Fórmula correta do skill china-brazil-import-strategy: ICMS por dentro
  const freight = modo === 'air' ? vol * 6 * 1000 : modo === 'fcl20' ? 2200 : vol * 180;
  const insurance = fob * qtd * 0.003;  // 0.3% sobre FOB
  const cif = fob * qtd + freight + insurance;

  const iiRate = 0.16;
  const ipiRate = 0.05;  // maioria dos NCMs é 0-5%
  const pisCofinsRate = 0.1175;  // 2.1% PIS + 9.65% COFINS
  const icmsRate = 0.18;

  const ii = cif * iiRate;
  const ipi = (cif + ii) * ipiRate;
  const pisCofins = cif * pisCofinsRate;
  const baseIcms = (cif + ii + ipi + pisCofins) / (1 - icmsRate);  // ICMS por dentro
  const icms = baseIcms * icmsRate;
  const afrmm = modo !== 'air' ? freight * 0.25 : 0;  // AFRMM 25% do frete marítimo
  const siscomex = 50 + cif * 0.005;  // capatazia ~0.5% CIF

  const despachante = 1500;
  const landedUsd = cif + ii + ipi + pisCofins + icms + afrmm + siscomex;
  const landedBrl = landedUsd * ptax + despachante;
  const landedUnit = landedBrl / qtd;

  const el = document.getElementById('lcResult');
  el.innerHTML = `
    <div class="result-row"><span>FOB total (${qtd} un)</span><span>$ ${(fob*qtd).toFixed(2)}</span></div>
    <div class="result-row"><span>Frete (${modo.toUpperCase()})</span><span>$ ${freight.toFixed(2)}</span></div>
    <div class="result-row"><span>Seguro (0.3% FOB)</span><span>$ ${insurance.toFixed(2)}</span></div>
    <div class="result-row"><span>CIF</span><span>$ ${cif.toFixed(2)}</span></div>
    <div class="result-row"><span>II (${(iiRate*100).toFixed(0)}%)</span><span>$ ${ii.toFixed(2)}</span></div>
    <div class="result-row"><span>IPI (${(ipiRate*100).toFixed(0)}%)</span><span>$ ${ipi.toFixed(2)}</span></div>
    <div class="result-row"><span>PIS/COFINS (11.75%)</span><span>$ ${pisCofins.toFixed(2)}</span></div>
    <div class="result-row"><span>ICMS (${(icmsRate*100).toFixed(0)}% — por dentro)</span><span>$ ${icms.toFixed(2)}</span></div>
    <div class="result-row"><span>AFRMM (25% frete)</span><span>$ ${afrmm.toFixed(2)}</span></div>
    <div class="result-row"><span>Siscomex + capatazia</span><span>$ ${siscomex.toFixed(2)}</span></div>
    <div class="result-row" style="font-weight:700"><span>Landed Total</span><span>R$ ${landedBrl.toFixed(2)}</span></div>
    <div class="result-row" style="font-weight:700"><span>Landed/Unidade</span><span>R$ ${landedUnit.toFixed(2)}</span></div>
  `;

  TEIA.registrar('calculo_landed_cost', { fob, ncm, landed: landedUnit });
}

function calcularStressTest() {
  const fob = parseFloat(document.getElementById('stFob').value) || 0;
  const preco = parseFloat(document.getElementById('stPreco').value) || 0;
  const ptax = 5.20;

  // Monte Carlo com ICMS por dentro (fórmula realista)
  let lucros = 0;
  const N = 10000;
  const fatorImpostos = 1 + 0.16 + 0.05 + 0.1175 + 0.18/(1-0.18) + 0.25*0.05 + 0.005; // II+IPI+PIS+ICMS+AFRMM+Siscomex
  for (let i = 0; i < N; i++) {
    const fx = ptax * (0.85 + Math.random() * 0.30);  // câmbio ±15%
    const freightVar = 0.8 + Math.random() * 0.4;       // frete ±20%
    const landed = fob * fx * fatorImpostos * freightVar + 3;
    if (preco > landed) lucros++;
  }

  const prob = (lucros / N * 100).toFixed(1);
  const verdict = prob > 95 ? '🟢 ROBUSTO' : prob > 80 ? '🟡 VIÁVEL' : '🔴 ARRISCADO';
  const margin = ((preco - fob * ptax * 1.5) / preco * 100).toFixed(1);

  const el = document.getElementById('stResult');
  el.innerHTML = `
    <div class="kpi"><div class="num">${prob}%</div><div class="lbl">Probabilidade de lucro (${N.toLocaleString()} cenários)</div></div>
    <div class="alert ${prob>80?'alert-info':'alert-warn'}">${verdict} — ${prob}% dos cenários dão lucro</div>
    <div class="result-row"><span>Margem estimada</span><span>${margin}%</span></div>
  `;

  TEIA.registrar('calculo_stress', { fob, preco, prob });
}

  // Usar dados do pipeline se disponíveis, senão dados estáticos

  if (dadosPipeline.length > 0) {
    // Filtrar pela categoria se não for "Todas" ou "Busca"
    const filtrados = catNome === 'Todas' || catNome === 'Busca'
      ? dadosPipeline
      : dadosPipeline.filter(r => r.categoria === catNome.toLowerCase().replace('🐱 ','').replace('🏠 ','').replace('💪 ','').replace('👶 ','').replace('🔌 ',''));
    if (filtrados.length > 0) {
      resultados = filtrados.sort((a,b) => b.score - a.score);
    } else {
      resultados = nichos.map(n => ({ nome: n, ...(DADOS_NICHOS[n] || { ncm:'0000.00.00', fob:1, landed:5, preco:19.90, margem:0.15, conc:10, score:40, truth:'estimated', truthLabel:'🟡 Estimativa IA', evidence:{source:'static-fallback',confidence:0.6}, topSellers:[], totalSellers:0, marketplaces:['ML'] }) })).sort((a,b) => b.score - a.score);
    }
  } else {
    resultados = nichos.map(n => ({ nome: n, ...(DADOS_NICHOS[n] || { ncm:'0000.00.00', fob:1, landed:5, preco:19.90, margem:0.15, conc:10, score:40, truth:'estimated', truthLabel:'🟡 Estimativa IA', evidence:{source:'static-fallback',confidence:0.6}, topSellers:[], totalSellers:0, marketplaces:['ML'] }) })).sort((a,b) => b.score - a.score);
  }

  // Limitar a 8 resultados
  resultados = resultados.slice(0, 8);

  const go = resultados.filter(r => r.score >= 70 && r.recomendacao !== 'insufficient_data').length;
  const top = resultados.filter(r => r.score >= 85 && r.recomendacao !== 'insufficient_data').length;
  const insuf = resultados.filter(r => r.recomendacao === 'insufficient_data').length;

      <td style="padding:6px">R$${r.preco.toFixed(2)}</td>
      <td style="padding:6px;color:${r.margem>0.3?'var(--g)': r.margem>0.15?'var(--y)':'var(--r)'};font-weight:700">${Math.round(r.margem*100)}%</td>

          <button class="btn btn-sm" style="background:#25d366;font-size:.62em;padding:3px 5px" 
            onclick="escanearML('${r.nome}')">🔍 ML</button>
          ${r.totalSellers != null ? `<span style="font-size:.65em;color:#888">👥 ${r.totalSellers} vend · ${(r.marketplaces||['ML','Shopee']).join(' ')}</span>` : `<span style="font-size:.65em;color:#aaa">👤 sem dados</span>`}
        </div>
      </td>
    </tr>`;
  }).join('');

  TEIA.registrar('prospeccao_ranking', { categoria: catNome, total: resultados.length, go, top });
  showToast(`✅ ${catNome}: ${resultados.length} nichos ranqueados · ${go} GO · ${top} TOP`);

async function dispararPipelineCategoria() {
  const termo = document.getElementById('prospTermo').value.trim();
  if (!termo) { showToast('⚠️ Digite um produto primeiro'); return; }

  const el = document.getElementById('prospResult');
  el.innerHTML = `<div class="alert alert-info">⚡ Pipeline disparado para "${termo}" — Discovery + Scanner + Sourcing via IA...</div>`;

  const key = getKey();
  if (!key) { el.innerHTML += `<div class="alert alert-err">❌ Configure a chave API em ⚙️ IA</div>`; return; }

  try {
    el.innerHTML += `<div class="alert alert-info" style="margin-top:4px">⏳ Fase 1/3: Scanner de mercado (ML/Shopee/Amazon)...</div>`;
    const r = await fetch('/api/pipeline', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ category: termo, api_key: key, provider: window.currentProvider })
    });
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || 'HTTP '+r.status);
    const d = await r.json();

    const produtos = d.nichos || [];
    produtos.forEach(p => { p.categoria = termo; p.ts = Date.now(); });
    TEIA.dados.ranking = [...(TEIA.dados.ranking||[]).filter(r=>r.categoria!==termo), ...produtos];
    try { localStorage.setItem('sa_ranking', JSON.stringify(TEIA.dados.ranking)); } catch(e) {}

    el.innerHTML += `<div class="alert alert-info" style="margin-top:4px">✅ Fase 2/3: Sourcing China — ${produtos.length} nichos encontrados</div>`;
    el.innerHTML += `<div class="alert alert-info" style="margin-top:4px">✅ Fase 3/3: Landed cost + margem — análise fiscal completa</div>`;
    el.innerHTML += `<button class="btn btn-sm" style="margin-top:8px" onclick="refreshTab('prosp')">📊 Ver Ranking (${produtos.length} nichos)</button>`;
    showToast(`✅ Pipeline concluído — ${produtos.length} nichos`);
    TEIA.registrar('prospeccao_pipeline', { termo, nichos: produtos.length });
  } catch(e) {
    el.innerHTML += `<div class="alert alert-err" style="margin-top:4px">❌ ${e.message}</div>`;
  }
}

let filterTimeout;
function filtrarFornecedores() {
  clearTimeout(filterTimeout);
  filterTimeout = setTimeout(() => {
    const q = (document.getElementById('fornSearch')?.value || '').toLowerCase();
    document.querySelectorAll('.forn-item').forEach(el => {
      el.style.display = (el.dataset.name || '').includes(q) ? '' : 'none';
    });

}

function copiarContato(email, whatsapp) {
  navigator.clipboard?.writeText(`Email: ${email} | WhatsApp: ${whatsapp}`).then(() => showToast('📋 Contato copiado!')).catch(() => showToast('Erro ao copiar'));
}

function abrirWhatsApp(whatsapp, name, produto, ncm, fob, moq) {

function fecharModal() { const m = document.getElementById('rfqModal'); if(m) m.remove(); }

function enviarEmail(email, produto, name) {
  const nome = document.getElementById('rfqNome')?.value || '[SEU NOME]';
  const empresa = document.getElementById('rfqEmpresa')?.value || '[SUA EMPRESA]';
  const cnpj = document.getElementById('rfqCnpj')?.value || '';
  const meuEmail = document.getElementById('rfqEmail')?.value || '[SEU EMAIL]';
  const meuWhats = document.getElementById('rfqWhatsApp')?.value || '';
  const qtd = document.getElementById('rfqQtd')?.value || '—';
  const oem = document.getElementById('rfqOem')?.value || '';
  const msgExtra = document.getElementById('rfqMsg')?.value || '';
  const obs = msgExtra ? '\nObservações: ' + msgExtra + '\n' : '';
  const oemLine = oem ? `\nPersonalização: ${oem}` : '';
  const cnpjLine = cnpj ? `\nCNPJ: ${cnpj}` : '';
  const body = `Subject: RFQ - ${produto} for Brazilian Market - ${empresa}\n\nDear ${name} Sales Team,\n\nMy name is ${nome}, I am the buyer at ${empresa}, a Brazilian e-commerce company. We are expanding our product line and found your company.\n\nWe are interested in: ${produto}\n\nPlease quote for:\n- Product: ${produto}\n- Quantity: ${qtd} units (initial order, then scale to ${parseInt(qtd)*3 || '—'} units/month)${oemLine}\n- Incoterms: FOB (port closest to you)\n- Payment: 30% T/T upfront + 70% against BL copy\n\nPlease provide:\n1. FOB price per unit (USD)\n2. MOQ (Minimum Order Quantity)\n3. Sample price + DHL cost to Brazil\n4. Sample lead time\n5. Production lead time\n6. Product specifications sheet (PDF)\n7. Available certifications (ISO, CE, SGS, etc.)\n8. OEM capability (custom brand, packaging, manual)\n9. Trade Assurance availability\n10. Production capacity per month${obs}\n\nAbout us:${cnpjLine}\n- Market: Brazil (200M+ population)\n\nLooking forward to your quote.\n\nBest regards,\n${nome}\n${empresa}\n${meuEmail}${meuWhats ? ' | WhatsApp: '+meuWhats : ''}`;
  window.open(`mailto:${email}?subject=${encodeURIComponent('RFQ: '+produto+' — '+qtd+' unidades')}&body=${encodeURIComponent(body)}`, '_blank');
  fecharModal();
}

function copiarTemplate(name, produto, ncm, fob, moq) {
  const nome = document.getElementById('rfqNome')?.value || '[SEU NOME]';
  const empresa = document.getElementById('rfqEmpresa')?.value || '[SUA EMPRESA]';
  const cnpj = document.getElementById('rfqCnpj')?.value || '';
  const meuEmail = document.getElementById('rfqEmail')?.value || '[SEU EMAIL]';
  const qtd = document.getElementById('rfqQtd')?.value || moq;
  const oem = document.getElementById('rfqOem')?.value || '';
  const cnpjLine = cnpj ? `\nCNPJ: ${cnpj}` : '';
  const oemLine = oem ? `\nPersonalização: ${oem}` : '';
  const template = `Subject: RFQ - ${produto} for Brazilian Market - ${empresa}\n\nDear ${name} Sales Team,\n\nMy name is ${nome}, I am the buyer at ${empresa}, a Brazilian e-commerce company.\n\nWe are interested in: ${produto} (NCM ${ncm})\n\nPlease quote for:\n- Product: ${produto}\n- NCM: ${ncm}\n- Target FOB: ${fob}\n- Quantity: ${qtd} units${oemLine}\n- Incoterms: FOB\n- Payment: 30% T/T upfront + 70% against BL\n\nPlease provide:\n1. FOB price per unit (USD)\n2. MOQ\n3. Sample price + DHL cost to Brazil\n4. Production lead time\n5. Certifications available\n6. OEM capability\n7. Trade Assurance availability\n\nAbout us:${cnpjLine}\n- Market: Brazil (200M+ population)\n\nLooking forward to your quote.\n\nBest regards,\n${nome}\n${empresa}\n${meuEmail}`;

function adicionarFornecedorManual() {
  const name = prompt('Nome do fornecedor:');
  if (!name) return;
  const email = prompt('Email:') || 'contato@fornecedor.cn';
  const whatsapp = prompt('WhatsApp (+86...):') || '+86-000-0000';
  const fob = prompt('FOB (USD):') || '$0.00';
  const moq = parseInt(prompt('MOQ:')) || 100;
  const supplier = { name, email, whatsapp, fob, moq:moq, port:'Manual', platform:'manual', website:'#', ncm:'[NCM]', produto:'[Produto]' };
  // Persistir
  let manual = [];
  try { manual = JSON.parse(localStorage.getItem('sa_fornecedores') || '[]'); } catch(e) {}
  manual.push(supplier);
  localStorage.setItem('sa_fornecedores', JSON.stringify(manual));
  // Re-renderizar aba
  forn();
  showToast('✅ Fornecedor adicionado!');
}

function validarCertsUI() {
  const categoria = document.getElementById('certsCategoria').value.trim();
  const lista = document.getElementById('certsLista').value.split(',').map(s => s.trim()).filter(Boolean);

  const necessariasPorCat = {
    eletronicos: ['INMETRO','ANATEL'], alimentos: ['ANVISA','MAPA'],
    suplementos: ['ANVISA'], cosmeticos: ['ANVISA'], brinquedos: ['INMETRO'],
  };
  const necessarias = necessariasPorCat[categoria] || ['INMETRO'];
  const enganosas = lista.filter(c => ['CE','FDA','RoHS','FCC','UL','CSA'].includes(c));
  const validas = lista.filter(c => necessarias.includes(c));
  const faltantes = necessarias.filter(c => !lista.includes(c));

  const el = document.getElementById('certsResult');
  el.innerHTML = `
    <div class="result-row"><span>Categoria</span><span>${categoria || '--'}</span></div>
    <div class="result-row"><span>Certificações declaradas</span><span>${lista.join(', ') || '--'}</span></div>
    <div class="result-row"><span>Necessárias no BR</span><span>${necessarias.join(', ')}</span></div>
    <div class="result-row"><span>✅ Válidas</span><span>${validas.join(', ') || 'nenhuma'}</span></div>
    <div class="result-row"><span>⛔ Faltantes</span><span style="color:var(--r)">${faltantes.join(', ') || 'nenhuma'}</span></div>
    ${enganosas.length ? `<div class="alert alert-warn">⚠️ ${enganosas.join(', ')} são INTERNACIONAIS — NÃO substituem ${necessarias.join('/')} no Brasil</div>` : ''}
    ${faltantes.length ? `<div class="alert alert-err">⛔ Fornecedor NÃO está pronto para importar para o Brasil</div>` : `<div class="alert alert-info">✅ Fornecedor atende todas as certificações BR</div>`}
  `;
}

async function escanearMarketplace() {
  const nicho = document.getElementById('intelNicho').value.trim();

  el.innerHTML = `<div class="alert alert-info">🔍 Análise completa de "${nicho}"...</div>`;

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        product: nicho,
        api_key: getKey()

async function sourcingChina() {
  const produto = document.getElementById('intelProduto').value.trim();
  if (!produto) { showToast('⚠️ Digite um produto'); return; }
  const el = document.getElementById('intelSourcingResult');
  el.innerHTML = `<div class="alert alert-info">🇨🇳 Buscando fornecedores para "${produto}"...</div>`;
  try {
    const r = await callAI([{role:'user',content:`Encontre fornecedores reais para "${produto}" em Alibaba/MIC/GlobalSources. Retorne APENAS JSON sem markdown: { product, ncm, suppliers[{name,platform,fob_usd,moq,location,certifications[],factory_confidence,estimated_landed_brl}], best_platform }`}],800);
    
    // 4 estratégias de parse JSON
    const content = typeof r.content === 'string' ? r.content : JSON.stringify(r.content);
    let d;
    try { d = JSON.parse(content); }
    catch(e1) {
      try { d = JSON.parse(content.replace(/```json\s*|```/g, '').trim()); }
      catch(e2) {
        try { const a=content.indexOf('{'), b=content.lastIndexOf('}'); if(a===-1||b===-1) throw Error; d=JSON.parse(content.substring(a,b+1)); }
        catch(e3) {
          try { const a=content.indexOf('['), b=content.lastIndexOf(']'); if(a===-1||b===-1) throw Error; const arr=JSON.parse(content.substring(a,b+1)); d=Array.isArray(arr)?{suppliers:arr}:arr; }
          catch(e4) { throw new Error('IA não retornou JSON válido'); }
        }
      }
    }
    
    el.innerHTML=`<div class="result-row"><span>Produto</span><span><strong>${d.product||produto}</strong></span></div><div class="result-row"><span>NCM</span><span>${d.ncm||'--'}</span></div><div class="result-row"><span>Plataforma</span><span>${d.best_platform||'--'}</span></div>${(d.suppliers||[]).map(s=>`<div class="supplier-card"><div class="info"><strong>🏭 ${s.name}</strong><br><span style="font-size:.78em">${s.platform} · FOB $${s.fob_usd} · MOQ ${s.moq} · ${s.location}</span><br><span style="font-size:.72em">Score: ${s.factory_confidence}/100 | Landed: R$${s.estimated_landed_brl}</span></div><div class="actions"><button class="btn btn-sm btn-email" onclick="switchTab('forn')">📧 Contato</button></div></div>`).join('')}`;
    TEIA.registrar('intel_sourcing',{produto,...d});
  } catch(e) { el.innerHTML=`<div class="alert alert-err">❌ ${e.message}</div>`; }
}

async function executarPipeline(categoria) {
  const el = document.getElementById('pipelineStatus');
  if (el.dataset.running === 'true') { showToast('⚠️ Pipeline já está rodando'); return; }
  el.dataset.running = 'true';
  
  const btns = document.querySelectorAll('#main button');
  btns.forEach(b => { if (b.textContent.includes('Todas') || b.textContent.includes('▶️')) b.disabled = true; });
  
  const inicio = Date.now();
  const cats = categoria==='todas'?['pet','casa','fitness','baby','eletronicos']:[categoria];
  const CATEGORIAS_NOMES = { pet:'Pet', casa:'Casa', fitness:'Fitness', baby:'Baby', eletronicos:'Eletrônicos' };

  el.innerHTML=`<div class="alert alert-info">⏳ Ciclo — ${cats.length} ${cats.length===1?'categoria':'categorias'}</div>`;

  TEIA.dados.ranking = TEIA.dados.ranking || [];
  const novosResultados = [];
  const key = getKey();
  if (!key) { el.innerHTML+=`<div class="alert alert-err">❌ Configure a chave API em ⚙️ IA</div>`; return; }

  for(const cat of cats) {
    const t0=Date.now(), id=`pipe_${cat}_${t0}`;
    el.innerHTML+=`<div class="alert alert-info" id="${id}">⏳ ${cat}: Discovery — chamando IA...</div>`;

    try {
      const catNome = CATEGORIAS_NOMES[cat] || cat;
      // Usar API pipeline serverless para análise completa
      const r = await fetch('/api/pipeline', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ category:cat, api_key:key, provider:window.currentProvider })
      });
      if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || 'HTTP '+r.status);
      const d = await r.json();

      const produtos = d.nichos || [];
      produtos.forEach(p => { p.categoria = cat; p.ts = Date.now(); });

      novosResultados.push(...produtos);
      TEIA.dados.ranking = [...TEIA.dados.ranking.filter(r=>r.categoria!==cat), ...produtos];
      try { localStorage.setItem('sa_ranking', JSON.stringify(TEIA.dados.ranking)); } catch(e) {}

      const t=((Date.now()-t0)/1000).toFixed(1);
      document.getElementById(id).innerHTML=`✅ ${cat}: ✓ OK · ${t}s · ${d.go||0} GO · ${d.top||0} TOP · ${produtos.length} nichos`;
      document.getElementById(id).className='alert alert-info';
      TEIA.registrar('pipeline_execucao',{categoria:cat,status:'ok',tempo:parseFloat(t),tipo:'IA',nichos:produtos.length,go:d.go,top:d.top});

    } catch(e) {
      document.getElementById(id).innerHTML=`⚠️ ${cat}: Erro — ${e.message}`;
      document.getElementById(id).className='alert alert-warn';
      TEIA.registrar('pipeline_execucao',{categoria:cat,status:'erro',tipo:'IA',erro:e.message});
    }
  }

  const total=((Date.now()-inicio)/1000).toFixed(0);
  el.dataset.running = 'false';
  btns.forEach(b => b.disabled = false);
  el.innerHTML+=`<div class="alert alert-info" style="margin-top:8px">✅ Pipeline concluído — ${novosResultados.length} nichos descobertos · <button class="btn btn-sm" onclick="refreshTab('prosp')">📊 Ver Ranking</button></div>`;
  showToast(`✅ ${novosResultados.length} nichos descobertos — vá em 🔍 Prospecção`);
}

function exportConfig() {
  const data = { apiKeys: window.apiKeys, provider: window.currentProvider, version: VERSAO };
  const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'super-agentes-config.json'; a.click();
}

function importConfig() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      if (data.apiKeys) { window.apiKeys = data.apiKeys; saveKeys(); }
      if (data.provider) { window.currentProvider = data.provider; saveKeys(); }
      ia(); // recarregar aba
      showToast('✅ Configuração importada!');
    } catch(e) { showToast('❌ Erro ao importar: ' + e.message); }
  };
  input.click();
}

async function init() {
  loadState();
  // Carregar ranking salvo do pipeline
  try {
    const raw = localStorage.getItem('sa_ranking');
    if (raw) TEIA.dados.ranking = JSON.parse(raw);
  } catch(e) {}
  switchTab('overview');
  await loadFromCloud();

  TEIA.registrar('sistema_iniciado', { version: VERSAO });
  updatePulse();

  // Auto-refresh se versão cloud > local (só depois de carregar)
  try {
    const r = await fetch('/api/state');
    const d = await r.json();
    if (d && d.state && d.state.version && d.state.version > VERSAO) {
      showToast('🔄 Nova versão disponível — recarregando...');
      setTimeout(() => window.location.reload(), 2000);
    }
  } catch(e) {}
}
